<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate Pass - Railway Pass</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand"><i class="fas fa-train"></i> Railway Pass</div>
        <div class="nav-menu">
            <span>Welcome, {{ session['user_name'] }}</span>
            <a href="{{ url_for('view_pass') }}"><i class="fas fa-ticket-alt"></i> My Passes</a>
            <a href="{{ url_for('logout') }}"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </nav>

    <div class="page-content">
        <div class="form-card">
            <div class="card-header">
                <i class="fas fa-passport"></i>
                <h2>Generate Your Pass</h2>
            </div>

            <form method="POST" action="{{ url_for('pass_generator') }}">
                <h3><i class="fas fa-tags"></i> Select Pass Type</h3>
                <div class="pass-types">
                    <label class="pass-type">
                        <input type="radio" name="pass_type" value="daily" required>
                        <div class="pass-type-inner">
                            <i class="fas fa-sun"></i>
                            <h4>Daily Pass</h4>
                            <span class="price">₹{{ prices.daily }}</span>
                            <small>24 Hours</small>
                        </div>
                    </label>
                    <label class="pass-type">
                        <input type="radio" name="pass_type" value="weekly">
                        <div class="pass-type-inner">
                            <i class="fas fa-calendar-week"></i>
                            <h4>Weekly Pass</h4>
                            <span class="price">₹{{ prices.weekly }}</span>
                            <small>7 Days</small>
                        </div>
                    </label>
                    <label class="pass-type">
                        <input type="radio" name="pass_type" value="monthly">
                        <div class="pass-type-inner">
                            <i class="fas fa-calendar-check"></i>
                            <h4>Monthly Pass</h4>
                            <span class="price">₹{{ prices.monthly }}</span>
                            <small>30 Days</small>
                        </div>
                    </label>
                </div>

                <div class="form-row">
                    <div class="input-group">
                        <label><i class="fas fa-plane-departure"></i> From City</label>
                        <select name="from_city" required>
                            <option value="">Select Source</option>
                            {% for city in cities %}
                            <option value="{{ city }}">{{ city }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-plane-arrival"></i> To City</label>
                        <select name="to_city" required>
                            <option value="">Select Destination</option>
                            {% for city in cities %}
                            <option value="{{ city }}">{{ city }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label><i class="fas fa-train"></i> Select Train</label>
                    <select name="train_number" required>
                        <option value="">Select Train</option>
                        {% for train in trains %}
                        <option value="{{ train.number }}">{{ train.name }} ({{ train.number }})</option>
                        {% endfor %}
                    </select>
                </div>

                <button type="submit" class="btn-login btn-full">
                    <i class="fas fa-credit-card"></i> Proceed to Payment
                </button>
            </form>
        </div>
    </div>
</body>
</html>
