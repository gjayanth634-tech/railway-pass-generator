<!DOCTYPE html>
<html>
<head>
    <title>Register - Railway Pass</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="container">
    <h2>Register</h2>

    <!-- Error Message -->
    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <!-- Registration Form -->
    <form method="POST">
        <input type="text" name="name" placeholder="Full Name" class="form-input" required value="{{ request.form.get('name', '') }}">
        <input type="email" name="email" placeholder="Email Address" class="form-input" required value="{{ request.form.get('email', '') }}">
        <input type="text" name="aadhaar" placeholder="Aadhaar Number (12 digits)" class="form-input" required pattern="\d{12}" title="Aadhaar must be 12 digits" value="{{ request.form.get('aadhaar', '') }}">
        <input type="text" name="mobile" placeholder="Mobile Number (10 digits)" class="form-input" required pattern="\d{10}" title="Mobile must be 10 digits" value="{{ request.form.get('mobile', '') }}">
        <input type="password" name="password" placeholder="Password" class="form-input" required>
        
        <button type="submit">Register</button>
    </form>
    
    <p style="text-align: center; margin-top: 15px;">Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
</div>

</body>
</html>
